name: Parrot
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
targets:
  Parrot:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Parrot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parrotlog
        PRODUCT_NAME: Parrot
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Parrot/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
  ParrotTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ParrotTests
    dependencies:
      - target: Parrot
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parrotlog.tests
  ParrotUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - ParrotUITests
    dependencies:
      - target: Parrot
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.parrotlog.uitests
        TEST_TARGET_NAME: Parrot
schemes:
  Parrot:
    build:
      targets:
        Parrot: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ParrotTests
        - ParrotUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
